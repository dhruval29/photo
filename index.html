<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Beautiful photo flipbook with realistic page-turning animations">
    <meta name="theme-color" content="#f5f5f5">
    
    <!-- Performance optimizations -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    
    <!-- Preload critical assets -->
    <link rel="preload" href="css/style.css" as="style">
    <link rel="preload" href="js/app.js" as="script">
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js" as="script" crossorigin>

    <!-- Preload first 3 images so they're ready before JS even runs -->
    <link rel="preload" href="images/Cover.webp" as="image" fetchpriority="high">
    <link rel="preload" href="images/image_1.webp" as="image" fetchpriority="high">
    <link rel="preload" href="images/image_2.webp" as="image" fetchpriority="high">
    
    <title>Photo Flipbook</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-content">
            <div class="spinner"></div>
            <p class="loading-text">Loading flipbook...</p>
            <p class="loading-progress">Starting...</p>
        </div>
    </div>

    <div class="container">
        <div class="flipbook-wrapper">
            <div id="flipbook" class="flipbook"></div>
        </div>
        
        <div class="controls">
            <button id="prevBtn" class="control-btn" aria-label="Previous page">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="14 18 8 12 14 6"></polyline>
                </svg>
            </button>
            
            <div id="pageCounter" class="page-counter">1 / 1</div>
            
            <button id="nextBtn" class="control-btn" aria-label="Next page">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="10 18 16 12 10 6"></polyline>
                </svg>
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js" crossorigin="anonymous"></script>
    <script src="js/app.js"></script>

    <!-- Vercel Analytics -->
    <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
